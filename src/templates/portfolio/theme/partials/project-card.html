<a class="project-card" href="{{project.url}}">
  <div class="project-card__cover">
    {{#if project.featured_image}}<img src="{{project.featured_image}}" alt="" loading="lazy">{{/if}}
  </div>
  <div class="project-card__row">
    <h3 class="project-card__title">{{project.title}}</h3>
    {{#if project.meta.year}}<span class="project-card__year mono">{{project.meta.year}}</span>{{/if}}
  </div>
  {{#if project.excerpt}}<p class="project-card__desc">{{project.excerpt}}</p>{{/if}}
</a>

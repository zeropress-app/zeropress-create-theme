<header class="site-header">
  <div class="site-header__inner">
    <a class="site-brand" href="/">{{#if site.meta.author_short_name}}{{site.meta.author_short_name}}{{#else}}{{site.title}}{{/if}}</a>

    {{#if menus.primary.items}}
      <nav class="primary-nav" aria-label="Primary">
        {{#for item in menus.primary.items}}
          <a href="{{item.url}}"{{#if_eq item.target "_blank"}} target="_blank" rel="noreferrer noopener"{{/if_eq}}>{{item.title}}</a>
        {{/for}}
      </nav>
    {{/if}}

    <div class="site-header__end">
      {{partial:social-links}}
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle color theme">
        <svg class="theme-toggle__sun" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="theme-toggle__moon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>
</header>

<header class="site-header">
  <div class="site-header__inner">
    <a class="site-brand" href="/">
      <span class="site-brand__mark" aria-hidden="true">¶</span>
      <span class="site-brand__word">{{site.title}}</span>
    </a>
    <nav class="site-nav" aria-label="Primary">
      {{menu:primary}}
    </nav>
    <div class="site-header__actions">
      <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle color theme">
        <span class="theme-toggle__icon" data-theme-icon-light aria-hidden="true">☼</span>
        <span class="theme-toggle__icon" data-theme-icon-dark aria-hidden="true">☾</span>
      </button>
    </div>
  </div>
</header>

<!doctype html>
<html lang="{{site.locale}}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {{partial:theme-init}}
    <title>{{meta.title}}</title>
    <meta name="theme-color" content="#fafaf7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0e0e0c" media="(prefers-color-scheme: dark)">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital,wght@0,400;1,400&family=Inter:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="/assets/style.css">
    {{meta.head_tags}}
  </head>
  <body class="theme-body">
    <a class="skip-link" href="#content">Skip to content</a>
    {{#if_eq route.type "post"}}{{partial:reading-progress}}{{/if_eq}}
    {{slot:header}}
    <main id="content" class="site-main">
      {{slot:content}}
    </main>
    {{slot:footer}}
    {{partial:content-enhancements}}
  </body>
</html>

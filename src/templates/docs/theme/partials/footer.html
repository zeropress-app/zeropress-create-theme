<footer class="site-footer">
  <div class="site-footer__inner">
    {{#if site.footer.copyright_text}}
      <p>{{site.footer.copyright_text}}</p>
    {{#else_if site.title}}
      <p>{{site.title}}</p>
    {{/if}}
    {{#if menus.footer.items}}
    <div class="site-footer__links">
      {{#for item in menus.footer.items}}
        <a href="{{item.url}}" {{#if item.target}}target="{{item.target}}"{{/if}} {{#if_eq item.target "_blank"}}rel="noopener noreferrer"{{/if}}>{{item.title}}</a>
      {{/for}}
    </div>
    {{/if}}
  </div>
  {{#if site.footer.attribution}}
  <div class="site-footer__attribution">
    <p>Published with <a href="https://zeropress.app" target="_blank" rel="noreferrer noopener">ZeroPress</a></p>
  </div>
  {{/if}}
</footer>

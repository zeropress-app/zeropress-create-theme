<article class="doc-article not-found">
  <p class="eyebrow">404</p>
  <h1>Page Not Found</h1>
  <p class="lede">The page you were looking for is not part of this build.</p>
  <div class="not-found__actions">
    <a class="button-link" href="/">Return home</a>
    {{#if site.search}}
    <button type="button" class="button-link button-link--ghost" data-cmdk-open disabled>
      <svg class="icon" width="14" height="14" aria-hidden="true"><use href="#icon-search"/></svg>
      Search the docs
    </button>
    {{/if}}
  </div>
</article>

<!doctype html>
<html lang="{{site.locale}}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {{partial:theme-init}}
    <title>{{meta.title}}</title>
    <meta name="theme-color" content="#FAF9F6" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1F1B1A" media="(prefers-color-scheme: dark)">
    <link rel="stylesheet" href="/assets/style.css">
    {{meta.head_tags}}
  </head>
  <body class="theme-body">
    {{partial:icon-sprite}}
    <a class="skip-link" href="#content">Skip to content</a>
    <div class="sr-only" aria-live="polite" aria-atomic="true" data-zp-status></div>
    <input type="checkbox" id="nav-toggle" class="nav-toggle" tabindex="-1" aria-label="Navigation menu">
    <label for="nav-toggle" class="nav-overlay" aria-hidden="true"></label>
    {{partial:header}}
    {{partial:sidebar}}
    <div class="page-shell">
      <main id="content" class="doc-main">
        {{slot:content}}
      </main>
      {{partial:footer}}
    </div>
    <div class="floating-actions" data-floating-actions>
      <button
        type="button"
        class="clear-search-highlights"
        data-clear-search-highlights
        aria-label="Clear search highlights"
        title="Clear search highlights"
        hidden
      >
        <svg class="icon" width="18" height="18" aria-hidden="true"><use href="#icon-x"/></svg>
      </button>
      <button
        type="button"
        class="back-to-top"
        data-back-to-top
        aria-label="Back to top"
        hidden
      >
        <span class="back-to-top__inner" aria-hidden="true">
          <svg class="icon" width="18" height="18" aria-hidden="true"><use href="#icon-chevrons-up"/></svg>
        </span>
      </button>
    </div>
    {{#if site.search}}{{partial:command-palette}}{{/if}}
    {{partial:content-enhancements}}
  </body>
</html>

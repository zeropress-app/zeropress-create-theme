<!doctype html>
<html lang="{{site.locale}}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {{partial:theme-init}}
    <title>{{meta.title}}</title>
    <meta name="theme-color" content="#FAF9F6" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1F1B1A" media="(prefers-color-scheme: dark)">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">
    <link rel="stylesheet" href="/assets/style.css">
    {{meta.head_tags}}
  </head>
  <body class="theme-body">
    <a class="skip-link" href="#content">Skip to content</a>
    <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true">
    <label for="nav-toggle" class="nav-overlay" aria-hidden="true"></label>
    {{partial:sidebar}}
    <div class="page-shell">
      {{partial:header}}
      <main id="content" class="doc-main">
        {{slot:content}}
      </main>
      {{partial:footer}}
    </div>
    {{partial:command-palette}}
    {{partial:content-enhancements}}
  </body>
</html>

<div class="shell page-shell">
  <article class="article-shell article-shell--page">
    <header class="article-header">
      <p class="eyebrow">Page</p>
      <h1>{{page.title}}</h1>
    </header>
    <div class="article-content prose-blog" {{#if site.search}}{{#if_neq page.discoverability "delist"}}data-pagefind-body{{/if_neq}}{{/if}}>{{page.html}}</div>
  </article>
</div>

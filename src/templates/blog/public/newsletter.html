<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Newsletter sign-up</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fffaf4;
        color: #2f241f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 1.5rem;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fffaf4;
      }

      form {
        width: min(100%, 28rem);
        display: grid;
        gap: 1rem;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(1.5rem, 5vw, 2rem);
        line-height: 1.15;
      }

      p {
        color: #6f625b;
        line-height: 1.55;
      }

      label {
        font-size: .75rem;
        text-transform: uppercase;
        letter-spacing: .14em;
        color: #6f625b;
      }

      input,
      button {
        width: 100%;
        border-radius: .375rem;
        font: inherit;
      }

      input {
        border: 1px solid #d9cdc3;
        padding: .75rem .85rem;
        background: white;
        color: #2f241f;
      }

      button {
        border: 0;
        padding: .8rem 1rem;
        background: #5f4035;
        color: #fffaf4;
        font-size: .75rem;
        font-weight: 700;
        letter-spacing: .16em;
        text-transform: uppercase;
        cursor: pointer;
      }

      .provider-note {
        font-size: .8125rem;
      }
    </style>
  </head>
  <body>
    <form action="https://buttondown.com/api/emails/embed-subscribe/example" method="post" target="_blank">
      <h1>Subscribe</h1>
      <p>Replace this trusted public HTML file with the embed form from your newsletter provider.</p>
      <label for="newsletter-email">Email address</label>
      <input id="newsletter-email" type="email" name="email" autocomplete="email" required>
      <button type="submit">Subscribe</button>
      <p class="provider-note">This starter uses a provider-hosted form action. ZeroPress does not submit newsletter forms itself.</p>
    </form>
  </body>
</html>
